<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWEET WOOD | Nordic Design & Craftsmanship</title>
    <style>
        /* SCANDI BOJE I TIPOGRAFIJA */
        :root { 
            --primary: #1a1a1a; /* Tamno siva za tekst */
            --accent: #d35400; /* Narandžasta za detalje */
            --bg-light: #f9f9f9; /* Svetlo siva pozadina */
            --text-main: #333;
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            line-height: 1.6; 
            color: var(--text-main); 
            background-color: var(--bg-light); 
            margin: 0; 
            overflow-x: hidden; 
        }
        
        header { 
            padding: 80px 20px; 
            text-align: center; 
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        header h1 { margin: 0; font-size: clamp(2.2em, 8vw, 3.8em); letter-spacing: 12px; text-transform: uppercase; font-weight: 200; color: var(--primary); }
        header p { font-size: 0.85em; letter-spacing: 4px; color: var(--accent); margin-top: 15px; text-transform: uppercase; }

        .hero-section { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        
        /* NOVI STIL ZA HERO CONTAINER SA FILTEROM */
        .hero-container {
            position: relative;
            width: 100%;
            height: 70vh; /* 70% visine ekrana */
            margin-bottom: 50px;
            overflow: hidden;
            border: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .hero-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            /* PRIMENJUJEMO BLUR I SVETLI FILTER */
            filter: blur(4px) brightness(1.05) contrast(0.95); /* Mekan, svetli Scandi ton */
            transform: scale(1.04); /* Malo povecavamo da blur ne pokvari ivice */
        }

        /* OVO JE MOGUĆI TAMNI SLOJ, ALI ZA SCANDI STIL JE BOLJE BEZ NJEGA NA BELOJ SLICI */
        /* .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255,255,255,0.2); /* Veoma svetli, transparentni sloj */
        } */

        .hero-text { max-width: 700px; margin: 0 auto; font-weight: 200; font-size: 1.3em; letter-spacing: 1px; color: var(--text-main); }

        .cta-container { margin-top: 70px; margin-bottom: 120px; }
        
        .btn-katalog { 
            display: inline-block; 
            border: 2px solid var(--primary); 
            color: var(--primary);
            padding: 18px 50px; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.95em; 
            transition: 0.4s; 
            background: transparent;
            font-weight: 400;
        }
        .btn-katalog:hover { background: var(--primary); color: #fff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        footer { text-align: center; padding: 80px; color: #888; font-size: 0.75em; letter-spacing: 3px; text-transform: uppercase; border-top: 1px solid #eee; background-color: #fff; }
    </style>
</head>
<body>

<header>
    <h1>SWEET WOOD</h1>
    <p>Nordic Design & Craftsmanship</p>
</header>

<div class="hero-section">
    <div class="hero-container">
        <img src="home-page-slika.jpg" alt="SWEET WOOD - Skandinavski dizajn dečijeg nameštaja belo drvo jasen bukva" class="hero-image">
        </div>
    
    <p class="hero-text">
        Inspirisani Nordic dizajnom, stvaramo nameštaj od plemenitog masiva jasena i bukve. Spoj prirodnih materijala i beskompromisne bezbednosti za vaše dete.
    </p>
    
    <div class="cta-container">
        <a href="katalog.html" class="btn-katalog">Pogledaj katalog</a>
    </div>
</div>

<footer>&copy; 2026 SWEET WOOD. SCANDINAVIAN QUALITY.</footer>

</body>
</html>
